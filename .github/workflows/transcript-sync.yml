name: Transcript Sync
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger transcript ingestion
        run: |
          curl -sf -X POST https://theia.theiasystems.co.uk/brain/ingest             -H 'X-Brain-Token: ${{ secrets.BRAIN_TOKEN }}'             -H 'Content-Type: application/json'             -d '{"speaker":"system","text":"[transcript-sync] Checking for new transcripts","channel":"github-actions"}'
